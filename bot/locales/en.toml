_version = 1

[start]
header_commands = "<b>Commands</b>"
cmd_vd = "<code>/vd</code> — download video. Calling this command is required to display download progress; otherwise, downloading will occur in \"silent\" mode."
cmd_ad = "<code>/ad</code> — download audio"
cmd_random = "<code>/rv</code>, <code>/ra</code> — random video or audio"
cmd_add_ed = "<code>/add_ed</code> — exclude domain from download"
cmd_rm_ed = "<code>/rm_ed</code> — include domain in download"
cmd_change_link_visibility = "<code>/change_link_visibility</code> — change link visibility in media caption"
cmd_stats = "<code>/stats</code> — usage statistics"
cmd_lang = "<code>/lang</code> — switch interface language"
header_inline = "<b>Inline Mode</b>"
inline_url = "<code>@%{username} &lt;url&gt;</code> — download by link"
inline_search = "<code>@%{username} &lt;title&gt;</code> — search on YouTube"
header_arguments = "<b>Arguments</b>"
args_for_vd_ad = "For <code>/vd</code> and <code>/ad</code>:"
arg_lang = "lang: Preferred audio language, example: <code>/vd [lang=ru]</code>"
arg_items = "items: Playlist download, <code>start:end:step</code> (default: 1 for each argument, max: 10 media per command), example: <code>/vd [items=1:3:1]</code>"
arg_crop = "crop: Download only a specific media time range, format <code>start-end</code>, supports <code>hh:mm:ss</code> (default: 0 for start and empty for end), example: <code>/vd [crop=00:01:30-]</code>"
args_for_random = "For <code>/rv</code> and <code>/ra</code>:"
arg_domains = "domains: Sources separated by <code>|</code>, example: <code>/rv [domains=youtube.com|youtu.be]</code>"
header_notes = "<b>Notes</b>"
note_args = "Arguments are specified in square brackets separated by commas: <code>[arg=value,arg2=value]</code>;"
note_optional = "All arguments are optional;"
note_websites = "Thousands of websites are supported;"
note_inline = "Inline mode supports <code>lang</code>, but doesn't support <code>items</code>;"
note_ignore = "You can add <code>yv2t_bot=false</code> to a link to ignore it;"
note_max_size = "I download media in the best quality under %{max_file_size_in_mb}MB;"
note_open_source = "The bot is open source: %{source_code}."
source_code_label = "source code"

