_version = 1

[start]
source_code_label = "source code"
body = """
<b>Commands</b>
- <code>/vd</code> — download video. Calling this command is required to display \
download progress; otherwise, downloading will occur in "silent" mode.
- <code>/ad</code> — download audio
- <code>/rv</code>, <code>/ra</code> — random video or audio
- <code>/add_ed</code> — exclude domain from download
- <code>/rm_ed</code> — include domain in download
- <code>/change_link_visibility</code> — change link visibility in media caption
- <code>/stats</code> — usage statistics
- <code>/lang</code> — switch interface language

<b>Inline Mode</b>
- <code>@%{username} &lt;url&gt;</code> — download by link
- <code>@%{username} &lt;title&gt;</code> — search on YouTube

<b>Arguments</b>
For <code>/vd</code> and <code>/ad</code>:
  - lang: Preferred audio language, example: <code>/vd [lang=ru]</code>
  - items: Playlist download, <code>start:end:step</code> \
(default: 1 for each argument, max: 10 media per command), \
example: <code>/vd [items=1:3:1]</code>
  - crop: Download only a specific media time range, format <code>start-end</code>, \
supports <code>hh:mm:ss</code> (default: 0 for start and empty for end), \
example: <code>/vd [crop=00:01:30-]</code>
For <code>/rv</code> and <code>/ra</code>:
  - domains: Sources separated by <code>|</code>, example: <code>/rv [domains=youtube.com|youtu.be]</code>

<b>Notes</b>
- Arguments are specified in square brackets separated by commas: <code>[arg=value,arg2=value]</code>;
- All arguments are optional;
- Thousands of websites are supported;
- Inline mode supports <code>lang</code>, but doesn't support <code>items</code>;
- You can add <code>yv2t_bot=false</code> to a link to ignore it;
- I download media in the best quality under %{max_file_size_in_mb}MB;
- The bot is open source: %{source_code}.\
"""

