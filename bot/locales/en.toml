_version = 1

[start]
source_code_label = "source code"
body = """
<b>Commands</b>
- <code>/vd</code> — download video. Use this command to track download progress; \
otherwise, downloading happens in silent mode.
- <code>/ad</code> — download audio
- <code>/pd</code> — download photo
- <code>/rv</code>, <code>/ra</code> — random video or audio
- <code>/shazam</code> — recognize a song from a replied voice, audio or video
- <code>/add_ed</code> — exclude domain from downloads
- <code>/rm_ed</code> — re-include domain in downloads
- <code>/change_link_visibility</code> — show or hide the link in media captions
- <code>/stats</code> — usage statistics
- <code>/lang</code> — switch interface language

<b>Inline Mode</b>
- <code>@%{username} &lt;url&gt;</code> — download by link
- <code>@%{username} &lt;title&gt;</code> — search on YouTube

<b>Arguments</b>
For <code>/vd</code> and <code>/ad</code>:
  - lang: preferred audio language, example: <code>/vd [lang=ru]</code>
  - items: playlist download, <code>start:end:step</code> \
(default: 1 for each, max 10 files per command), \
example: <code>/vd [items=1:3:1]</code>
  - overwrite: force re-download and replace cached media, \
example: <code>/vd [overwrite=true]</code>
  - crop: download a specific time range, format <code>start-end</code>, \
supports <code>hh:mm:ss</code> (default: 0 for start, empty for end), \
example: <code>/vd [crop=00:01:30-]</code>
For <code>/rv</code> and <code>/ra</code>:
  - domains: sources separated by <code>|</code>, example: <code>/rv [domains=youtube.com|youtu.be]</code>

<b>Notes</b>
- Arguments go in square brackets, separated by commas: <code>[arg=value,arg2=value]</code>;
- All arguments are optional;
- Thousands of websites are supported;
- Inline mode supports <code>lang</code> and <code>overwrite</code>, but not <code>items</code>;
- Add <code>yv2t_bot=false</code> to any link to have the bot ignore it;
- Media is downloaded in the best quality up to %{max_file_size_in_mb} MB;
- This bot is open source: %{source_code}.\
"""

