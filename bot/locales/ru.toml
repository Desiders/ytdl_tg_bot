_version = 1

[start]
source_code_label = "исходный код"
body = """
<b>Команды</b>
- <code>/vd</code> — скачать видео. Используйте эту команду, чтобы видеть прогресс \
загрузки; без неё скачивание происходит в «тихом» режиме.
- <code>/ad</code> — скачать аудио
- <code>/rv</code>, <code>/ra</code> — случайное видео или аудио
- <code>/add_ed</code> — исключить домен из скачивания
- <code>/rm_ed</code> — вернуть домен в скачивание
- <code>/change_link_visibility</code> — показывать или скрывать ссылку в подписи к медиа
- <code>/stats</code> — статистика использования
- <code>/lang</code> — сменить язык интерфейса

<b>Inline-режим</b>
- <code>@%{username} &lt;ссылка&gt;</code> — скачать по ссылке
- <code>@%{username} &lt;название&gt;</code> — поиск на YouTube

<b>Аргументы</b>
Для <code>/vd</code> и <code>/ad</code>:
  - lang: предпочитаемый язык аудио, пример: <code>/vd [lang=ru]</code>
  - items: скачивание плейлиста, <code>начало:конец:шаг</code> \
(по умолчанию: 1 для каждого параметра, не более 10 файлов за команду), \
пример: <code>/vd [items=1:3:1]</code>
  - crop: скачать только указанный фрагмент, формат <code>начало-конец</code>, \
поддерживается <code>чч:мм:сс</code> (по умолчанию: 0 для начала, пусто для конца), \
пример: <code>/vd [crop=00:01:30-]</code>
Для <code>/rv</code> и <code>/ra</code>:
  - domains: источники через <code>|</code>, пример: <code>/rv [domains=youtube.com|youtu.be]</code>

<b>Примечания</b>
- Аргументы указываются в квадратных скобках через запятую: <code>[arg=value,arg2=value]</code>;
- Все аргументы необязательны;
- Поддерживаются тысячи сайтов;
- Inline-режим поддерживает <code>lang</code>, но не поддерживает <code>items</code>;
- Чтобы бот проигнорировал ссылку, добавьте к ней <code>yv2t_bot=false</code>;
- Скачиваю медиа в наилучшем качестве, до %{max_file_size_in_mb} МБ;
- Бот с открытым исходным кодом: %{source_code}.\
"""

