_version = 1

[start]
header_commands = "<b>Команды</b>"
cmd_vd = "<code>/vd</code> — скачать видео. Эта команда нужна, чтобы видеть прогресс загрузки; иначе скачивание идёт в «тихом» режиме."
cmd_ad = "<code>/ad</code> — скачать аудио"
cmd_random = "<code>/rv</code>, <code>/ra</code> — случайное видео или аудио"
cmd_add_ed = "<code>/add_ed</code> — исключить домен из скачивания"
cmd_rm_ed = "<code>/rm_ed</code> — вернуть домен в скачивание"
cmd_change_link_visibility = "<code>/change_link_visibility</code> — переключить видимость ссылки в подписи к медиа"
cmd_stats = "<code>/stats</code> — статистика использования"
cmd_lang = "<code>/lang</code> — переключить язык интерфейса"
header_inline = "<b>Inline-режим</b>"
inline_url = "<code>@%{username} &lt;ссылка&gt;</code> — скачать по ссылке"
inline_search = "<code>@%{username} &lt;название&gt;</code> — поиск на YouTube"
header_arguments = "<b>Аргументы</b>"
args_for_vd_ad = "Для <code>/vd</code> и <code>/ad</code>:"
arg_lang = "lang: предпочитаемый язык аудио, пример: <code>/vd [lang=ru]</code>"
arg_items = "items: скачивание плейлиста, <code>начало:конец:шаг</code> (по умолчанию: 1 для каждого аргумента, максимум 10 медиа за команду), пример: <code>/vd [items=1:3:1]</code>"
arg_crop = "crop: скачать только указанный временной отрезок, формат <code>start-end</code>, поддерживается <code>hh:mm:ss</code> (по умолчанию: 0 для начала и пусто для конца), пример: <code>/vd [crop=00:01:30-]</code>"
args_for_random = "Для <code>/rv</code> и <code>/ra</code>:"
arg_domains = "domains: источники через <code>|</code>, пример: <code>/rv [domains=youtube.com|youtu.be]</code>"
header_notes = "<b>Примечания</b>"
note_args = "Аргументы указываются в квадратных скобках через запятую: <code>[arg=value,arg2=value]</code>;"
