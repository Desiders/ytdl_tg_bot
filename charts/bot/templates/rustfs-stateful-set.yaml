{{- if .Values.rustfs.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      containers:
        - name: rustfs
          image: "{{ .Values.rustfs.image.repository }}:{{ .Values.rustfs.image.tag }}"
          imagePullPolicy: {{ .Values.rustfs.image.pullPolicy }}
          args:
            - /data
          ports:
            - name: s3
              containerPort: 9000
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rustfs.secretName }}
                  key: access-key-id
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rustfs.secretName }}
                  key: secret-access-key
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: s3
          livenessProbe:
            tcpSocket:
              port: s3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.rustfs.storage }}
        storageClassName: {{ .Values.rustfs.storageClass | default "" }}
{{- end }}
