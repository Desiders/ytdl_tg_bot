apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ca-root
  namespace: {{ .Release.Namespace }}
spec:
  isCA: true
  commonName: K8s CA
  secretName: ca-root-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: ca-issuer-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: ca-root-secret
    namespace: {{ .Release.Namespace }}
