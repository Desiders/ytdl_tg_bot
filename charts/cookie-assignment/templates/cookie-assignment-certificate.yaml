apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cookie-assignment-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: cookie-assignment-tls-secret
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - {{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local
