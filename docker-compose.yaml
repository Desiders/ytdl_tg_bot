services:
  bot:
    container_name: ytdl_tg_bot.bot
    image: desiders/ytdl_tg_bot:4.5.0
    restart: "unless-stopped"
    env_file:
      - ".env"
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-config.toml}
    build:
      context: .
    networks:
      - postgres.network
      - yt_toolkit_api.network
      - yt_pot_provider_api.network
      - telegram_bot_api.network
    volumes:
      - type: bind
        source: ./config.toml
        target: /app/config.toml
      - type: bind
        source: ./yt-dlp
        target: /app/yt-dlp
      - type: bind
        source: ./cookies
        target: /app/cookies 
    depends_on:
      postgres:
        condition: service_healthy
      yt_toolkit_api:
        condition: service_started
      yt_pot_provider_api:
        condition: service_started
      telegram_bot_api:
        condition: service_started
    mem_limit: $BOT_MEM_LIMIT
    profiles:
      - default

  postgres:
    container_name: ytdl_tg_bot.postgres
    image: "postgres:18-alpine"
    hostname: ytdl_tg_bot.postgres
    restart: "unless-stopped"
    expose:
      - "5432"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - postgres.network
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: ${POSTGRES_USER:-$USER}
      POSTGRES_DB: ${POSTGRES_DB:-$USER}
    volumes:
      - postgres.data:/var/lib/postgresql/users:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 10s
    profiles:
      - default
      - migration
      - dev

  yt_toolkit_api:
    container_name: ytdl_tg_bot.yt_toolkit_api
    image: ghcr.io/ikiovi/yt-toolkit/info-api:v2.0.0
    restart: "unless-stopped"
    networks:
      - yt_toolkit_api.network
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${YT_TOOLKIT_PORT:-8080}:8080"
    profiles:
      - default
      - dev

  yt_pot_provider_api:
    container_name: ytdl_tg_bot.yt_pot_provider_api
    image: brainicism/bgutil-ytdlp-pot-provider:1.2.2
    restart: "unless-stopped"
    networks:
      - yt_pot_provider_api.network
    expose:
      - "4416"
    ports:
      - "127.0.0.1:${YT_POT_PROVIDER_PORT:-4416}:4416"
    profiles:
      - default
      - dev

  telegram_bot_api:
    container_name: ytdl_tg_bot.telegram_bot_api
    image: aiogram/telegram-bot-api:latest
    restart: "unless-stopped"
    environment:
      TELEGRAM_API_ID: $TELEGRAM_API_ID
      TELEGRAM_API_HASH: $TELEGRAM_API_HASH
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram_bot_api.data:/var/lib/telegram-bot-api
    networks:
      - telegram_bot_api.network
    expose:
      - "8081"
    ports:
      - "127.0.0.1:${TELEGRAM_BOT_API_PORT:-8081}:8081"
    profiles:
      - default
      - dev

  migration:
    container_name: ytdl_tg_bot.migration
    image: desiders/ytdl_tg_bot.migration:1.6.0
    restart: "no"
    environment:
      DATABASE_URL: $DATABASE_URL
    build:
      context: ./migration
    networks:
      - postgres.network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migration

  victoria_metrics:
    container_name: ytdl_tg_bot.victoria_metrics
    image: victoriametrics/victoria-metrics:latest
    expose:
      - "8428"
    ports:
      - "127.0.0.1:${VICTORIA_METRICS_PORT:-8428}:8428"
    networks:
      - monitoring.network
    volumes:
      - vm_data:/victoria-metrics-data
    profiles:
      - metrics-db

  node_exporter:
    container_name: ytdl_tg_bot.node_exporter
    image: quay.io/prometheus/node-exporter:latest 
    restart: unless-stopped
    pid: host
    expose:
      - "9100"
    networks:
      - monitoring.network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    profiles:
      - monitoring

  postgres_exporter:
    container_name: ytdl_tg_bot.postgres_exporter
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: $DATABASE_URL
    expose:
      - "9187"
    networks:
      - postgres.network
      - monitoring.network
    profiles:
      - monitoring

  vmagent:
    container_name: ytdl_tg_bot.vmagent
    image: victoriametrics/vmagent:latest
    restart: unless-stopped
    env_file:
      - ".env"
    expose:
      - "8429"
    networks:
      - monitoring.network
    volumes:
      - vmagent.data:/tmp/vmagent-remotewrite-data
      - ./victoria-metrics/scrape.yaml:/config/scrape.yml:ro
    command:
      - "--promscrape.config=/config/scrape.yml"
      - "--remoteWrite.url=${VMAGENT_REMOTE_WRITE_URL}"
      - "--remoteWrite.maxDiskUsagePerURL=${VMAGENT_MAX_DISK}"
      - "--remoteWrite.basicAuth.username=${VMAGENT_REMOTE_WRITE_USER}"
      - "--remoteWrite.basicAuth.password=${VMAGENT_REMOTE_WRITE_PASSWORD}"
    depends_on:
      - node_exporter
      - postgres_exporter
    profiles:
      - monitoring

  grafana:
    container_name: ytdl_tg_bot.grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      VICTORIA_METRICS_URL: $VICTORIA_METRICS_URL
      GRAFANA_USER: $GRAFANA_USER
      GRAFANA_PASSWORD: $GRAFANA_PASSWORD
      GF_AUTH_ANONYMOUS_ENABLED: $GRAFANA_ANONYMOUS_ENABLED
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    networks:
      - monitoring.network
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana.data:/var/lib/grafana
    profiles:
      - metrics

volumes:
  postgres.data: {}
  telegram_bot_api.data: {}
  vm_data: {}
  vmagent.data: {}
  grafana.data: {}

networks:
  postgres.network: {}
  yt_toolkit_api.network: {}
  yt_pot_provider_api.network: {}
  telegram_bot_api.network: {}
  monitoring.network: {}
